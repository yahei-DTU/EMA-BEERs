site_name: EMA-BEERs
site_author: yahei-DTU
docs_dir: source

theme:
  language: en
  name: material
  features:
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Content: 
    - uv: uv.md
    - Cookiecutter: cookiecutter.md
    - Hydra: hydra.md
    - Unit Testing: unit_testing.md
    - W&B: wandb.md
    - Pre-commit: pre-commit.md
    - FastAPI: fastapi.md
    - MkDocs: mkdocs.md